[req]
default_bits       = 2048
distinguished_name = req_distinguished_name
req_extensions     = req_ext
prompt             = no

[req_distinguished_name]
C  = US
O  = OpenBalancerDev
CN = openbalancer.local

[req_ext]
subjectAltName = @alt_names

[alt_names]
DNS.1 = localhost
DNS.2 = openbalancer.local
DNS.3 = dashboard.openbalancer.local
IP.1  = 127.0.0.1
IP.2  = 192.168.1.5
